<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1a1a2e">
  <title>Ems's Badminton Blast</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a2e; touch-action: none; }
    canvas { display: block; margin: 0 auto; image-rendering: pixelated; }
    #ui-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 10;
    }
    #mobile-controls {
      position: fixed; bottom: 0; left: 0; width: 100%; height: 140px;
      pointer-events: auto; z-index: 20; display: none;
    }
    .ctrl-btn {
      position: absolute; width: 60px; height: 60px; border-radius: 50%;
      background: rgba(255,255,255,0.2); border: 2px solid rgba(255,255,255,0.4);
      color: #fff; font-size: 24px; display: flex; align-items: center;
      justify-content: center; user-select: none; -webkit-user-select: none;
    }
    .ctrl-btn:active { background: rgba(255,255,255,0.4); }
    #btn-left { bottom: 20px; left: 20px; }
    #btn-right { bottom: 20px; left: 100px; }
    #btn-jump { bottom: 20px; right: 20px; }
    #btn-smash { bottom: 20px; right: 100px; }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <div id="mobile-controls">
    <div class="ctrl-btn" id="btn-left">◀</div>
    <div class="ctrl-btn" id="btn-right">▶</div>
    <div class="ctrl-btn" id="btn-jump">↑</div>
    <div class="ctrl-btn" id="btn-smash">🏸</div>
  </div>
  <script src="./engine.js"></script>
  <script src="./graphics.js"></script>
  <script src="./levels.js"></script>
  <script src="./game.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }
  </script>
</body>
</html>
